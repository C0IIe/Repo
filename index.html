<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 30px;
            font-size: 3em;
            animation: bounce 1s infinite alternate;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        img {
            margin-top: 20px;
            max-width: 90%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        .message {
            font-size: 1.4em;
            margin-top: 20px;
            max-width: 80%;
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-12px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 Happy Birthday! 🎂</h1>

        <img src="penny-polendina-rwby.gif">

        <div class="message">
            Wishing you lots of happiness, fun, and cake! 🎉🎁
        </div>
    </div>

</body>
</html>
