<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            font-size: 2em;
            font-weight: bold;
        }

        main {
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            color: #333;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        Welcome to My Website
    </header>

    <main>
        <p>This is a simple HTML page you can edit and customize.</p>
        <button onclick="sayHello()">Click Me</button>
    </main>

    <footer>
        © 2026 My Website
    </footer>

    <script>
        function sayHello() {
            alert("Hello! You clicked the button 🚀");
        }
    </script>

</body>
</html>
